version: "3.9"

services:
  db:
    image: mariadb:10.4
    container_name: damncrud_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: badcrud
    ports:
      - "3306:3306"
    volumes:
      - ./damncrud.sql:/docker-entrypoint-initdb.d/damncrud.sql
    networks:
      - testnet

  web:
    build: .
    container_name: damncrud_app
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - testnet

  selenium:
    image: selenium/standalone-chrome:latest
    container_name: selenium
    shm_size: 2gb
    ports:
      - "4444:4444"
    networks:
      - testnet

networks:
  testnet: