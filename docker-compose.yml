version: "3.9"

services:
  db:
    image: mariadb:10.4
    container_name: damncrud_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: damncrud
    ports:
      - "3306:3306"
    volumes:
      - ./damncrud.sql:/docker-entrypoint-initdb.d/damncrud.sql
    networks:
      - testnet

  web:
    build: .
    container_name: damncrud_app
    depends_on:
      - db
    ports:
      - "8080:80"
    networks:
      - testnet

networks:
  testnet: