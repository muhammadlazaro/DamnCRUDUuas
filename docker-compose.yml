version: "3.9"

services:
  db:
    image: mariadb:10.4
    container_name: damncrud_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: damncrud
      MYSQL_USER: damncrud_user
      MYSQL_PASSWORD: damncrud_pass
    volumes:
      - ./db/damncrud.sql:/docker-entrypoint-initdb.d/1-init.sql
    ports:
      - "3306:3306"
    networks:
      - testnet
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "damncrud_user", "-pdamncrud_pass"]
      interval: 5s
      timeout: 3s
      retries: 30

  web:
    build: .
    container_name: damncrud_app
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: damncrud_user
      DB_PASSWORD: damncrud_pass
      DB_NAME: damncrud
    networks:
      - testnet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/login.php"]
      interval: 5s
      timeout: 3s
      retries: 30

networks:
  testnet:
    driver: bridge