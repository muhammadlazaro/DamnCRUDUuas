version: "3.9"

services:
  web:
    build: .
    container_name: damncrud_app
    ports:
      - "8080:80"
    networks:
      - testnet

  selenium:
    image: selenium/standalone-chrome:latest
    container_name: selenium
    shm_size: 2gb
    ports:
      - "4444:4444"
    networks:
      - testnet

networks:
  testnet: