name: Selenium CI (End to End)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Python dependencies
      run: |
        cd DamnCRUD-uas2026
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Start application with Docker
      run: |
        cd DamnCRUD-uas2026
        docker compose up -d
        sleep 30

    - name: Run Selenium Tests in Parallel
      run: |
        cd DamnCRUD-uas2026
        pytest selenium/tests -n auto -v

    - name: Shutdown containers
      if: always()
      run: |
        cd DamnCRUD-uas2026
        docker compose down -v