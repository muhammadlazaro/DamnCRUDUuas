name: Selenium CI (End to End)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Start application with Docker
      run: |
        docker compose up -d
        docker ps

    - name: Wait for web app to be ready
      run: |
        echo "Waiting for web application to start..."
        sleep 30
        max_attempts=10
        attempt=1
        while [ $attempt -le $max_attempts ]; do
          if curl -I http://localhost:8080 2>/dev/null | grep -q "HTTP"; then
            echo "Web app is ready!"
            break
          fi
          echo "Attempt $attempt/$max_attempts - Waiting..."
          sleep 3
          attempt=$((attempt + 1))
        done

    - name: Run Selenium Tests in Parallel
      run: |
        cd DamnCRUD-uas2026
        mkdir -p test-results
        pytest selenium/tests -n auto -v --timeout=30 --html=test-results/report.html --self-contained-html

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: test-results/
        retention-days: 7

    - name: Publish test report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pytest-report
        path: test-results/report.html

    - name: Shutdown containers
      if: always()
      run: docker compose down -v