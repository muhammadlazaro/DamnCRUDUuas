[pytest]
# Parallel execution dengan pytest-xdist
addopts = 
    -n auto
    --dist loadscope
    --timeout=30
    --html=test-results/report.html
    --self-contained-html
    -v
    --tb=short

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Timeout configuration
timeout = 30

# Markers untuk test categorization
markers =
    ft006: FT_006 - Add Contact Valid
    ft008: FT_008 - Edit Contact
    ft009: FT_009 - Delete Contact
    ft016: FT_016 - Search Not Found
    ft019: FT_019 - Upload Invalid Photo
